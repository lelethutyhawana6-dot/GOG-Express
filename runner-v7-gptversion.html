<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GOG Express Runner V7</title>

</head>

<body>

<!-- ========================================= -->
<!-- GOG EXPRESS RUNNER LOGIN -->
<!-- ========================================= -->

<div id="loginPage">

    <h1>🏍️ GOG EXPRESS RUNNER</h1>

    <h2>Runner Login</h2>

    <input
        type="text"
        id="runnerId"
        placeholder="Runner ID">

    <br><br>

    <input
        type="password"
        id="runnerPin"
        placeholder="5-digit PIN">

    <br><br>

    <button onclick="loginRunner()">
        Login
    </button>

</div>

<!-- ========================================= -->
<!-- RUNNER DASHBOARD -->
<!-- ========================================= -->

<div id="dashboard" style="display:none;">

    <h1>🏍️ GOG EXPRESS RUNNER DASHBOARD</h1>

    <h2 id="welcomeText">
        Ready to go? Enjoy, mate!
    </h2>

    <button onclick="loadOrders()">
        Load Orders
    </button>

    <button onclick="loadOrderSummary()">
        Order Summary
    </button>

    <button onclick="logoutRunner()">
        Logout
    </button>

    <button onclick="testSound()">
        🔔 Test Sound
    </button>

    <hr>

    <div id="ordersList">

        No orders loaded yet.

    </div>

</div>

<script type="module">

//==================================================
// GOG EXPRESS RUNNER V7
// Developed by Lelethu Tyhawana
// Assisted by ChatGPT
//==================================================


//=========================
// FIREBASE IMPORTS
//=========================

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {

    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc

}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";


//=========================
// FIREBASE CONFIG
//=========================

const firebaseConfig = {

    apiKey: "AIzaSyBW6l4EVSaaNYnxuIt2rVsVDEj2RQdXBR8",

    authDomain: "gog-express.firebaseapp.com",

    projectId: "gog-express",

    storageBucket: "gog-express.firebasestorage.app",

    messagingSenderId: "831128185396",

    appId: "1:831128185396:web:e6a3b4bbaa4b0c1e103861",

    measurementId: "G-2R7CLDKEPV"

};


//=========================
// INITIALIZE FIREBASE
//=========================

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


//=========================
// NOTIFICATION SOUND
//=========================

const notificationSound =
    new Audio("notification.mp3");

function testSound() {

    notificationSound.play();

}

window.testSound = testSound;


//=========================
// RUNNER DATABASE
//=========================

const runners = [

    {

        id: "GOG001",

        name: "Lelethu",

        pin: "12345"

    },

    {

        id: "GOG002",

        name: "AI",

        pin: "54321"

    },

    {

        id: "GOG003",

        name: "Mahlathi",

        pin: "67890"

    }

];

//=========================
// LOGIN
//=========================

function loginRunner() {

    const id =
        document.getElementById("runnerId").value.trim();

    const pin =
        document.getElementById("runnerPin").value.trim();

    const runner = runners.find(r =>
        r.id === id &&
        r.pin === pin
    );

    if (!runner) {

        alert("Incorrect Runner ID or PIN.");

        return;

    }

    // Save runner details

    sessionStorage.setItem(
        "runnerId",
        runner.id
    );

    sessionStorage.setItem(
        "runnerName",
        runner.name
    );

    // Hide login page

    document.getElementById(
        "loginPage"
    ).style.display = "none";

    // Show dashboard

    document.getElementById(
        "dashboard"
    ).style.display = "block";

    // Welcome message

    document.getElementById(
        "welcomeText"
    ).innerHTML =
        "Welcome, " +
        runner.name +
        "! Ready to go?";

    alert(
        "Welcome " +
        runner.name +
        "!"
    );

    loadOrders();

}



//=========================
// LOGOUT
//=========================

function logoutRunner() {

    sessionStorage.removeItem(
        "runnerId"
    );

    sessionStorage.removeItem(
        "runnerName"
    );

    document.getElementById(
        "dashboard"
    ).style.display = "none";

    document.getElementById(
        "loginPage"
    ).style.display = "block";

    document.getElementById(
        "runnerId"
    ).value = "";

    document.getElementById(
        "runnerPin"
    ).value = "";

}



//=========================
// AUTO LOGIN
//=========================

const savedRunner =
    sessionStorage.getItem(
        "runnerName"
    );

if (savedRunner) {

    document.getElementById(
        "loginPage"
    ).style.display = "none";

    document.getElementById(
        "dashboard"
    ).style.display = "block";

    document.getElementById(
        "welcomeText"
    ).innerHTML =
        "Welcome back, " +
        savedRunner +
        "!";

    loadOrders();

}



//=========================
// WINDOW FUNCTIONS
//=========================

window.loginRunner =
    loginRunner;

window.logoutRunner =
    logoutRunner;

    //=========================
// LOAD AVAILABLE ORDERS
//=========================

async function loadOrders() {

    let html = "";

    const querySnapshot =
        await getDocs(collection(db, "orders"));

    querySnapshot.forEach((docSnap) => {

        const data = docSnap.data();

        if (data.status !== "Pending Payment") return;

        html += `

        <div style="
            border:1px solid black;
            padding:10px;
            margin:10px;
        ">

            <h3>${data.orderNumber}</h3>

            <p><b>Customer:</b> ${data.customer}</p>

            <p><b>Institution:</b> ${data.institution}</p>

            <p><b>Location:</b> ${data.location}</p>

            <p><b>Total:</b> R${data.total}</p>

            <button onclick="acceptOrder('${docSnap.id}')">
                Accept Order
            </button>

        </div>

        `;

    });

    if(html===""){
        html="<h3>No available orders.</h3>";
    }

    document.getElementById("ordersList").innerHTML = html;

}



//=========================
// ACCEPT ORDER
//=========================

async function acceptOrder(id){

    await updateDoc(
        doc(db,"orders",id),
        {

            runner:
                sessionStorage.getItem("runnerName"),

            status:
                "Accepted"

        }
    );

    alert("Order Accepted!");

    loadOrders();

}



//=========================
// LOAD ORDER SUMMARY
//=========================

async function loadOrderSummary(){

    let html="";

    const querySnapshot=
        await getDocs(collection(db,"orders"));

    querySnapshot.forEach((docSnap)=>{

        const data=docSnap.data();

        if(
            data.runner !==
            sessionStorage.getItem("runnerName")
        ){
            return;
        }

        html+=`

<div style="
border:1px solid green;
padding:10px;
margin:10px;
">

<h3>${data.orderNumber}</h3>

<p><b>Customer:</b> ${data.customer}</p>

<p><b>Total:</b> R${data.total}</p>

<p><b>Status:</b> ${data.status}</p>

<p><b>Special Request:</b>
${data.specialRequest || "None"}
</p>

${
data.status==="Accepted"

?

`<button onclick="startDelivery('${docSnap.id}')">

Confirm Pick-up / Payment

</button>`

:

""

}

${
data.status==="In Transit"

?

`

<input
id="pin-${docSnap.id}"
placeholder="Enter PIN">

<button
onclick="completeDelivery('${docSnap.id}')">

Confirm Delivery

</button>

`

:

""

}

</div>

`;

    });

    if(html===""){

        html="<h3>No active deliveries.</h3>";

    }

    document.getElementById(
        "ordersList"
    ).innerHTML=html;

}



//=========================
// START DELIVERY
//=========================

async function startDelivery(id){

    await updateDoc(

        doc(db,"orders",id),

        {

            status:"In Transit"

        }

    );

    alert("Delivery Started!");

    loadOrderSummary();

}



//=========================
// COMPLETE DELIVERY
//=========================

async function completeDelivery(id){

    const querySnapshot=
        await getDocs(collection(db,"orders"));

    let orderData=null;

    querySnapshot.forEach((docSnap)=>{

        if(docSnap.id===id){

            orderData=docSnap.data();

        }

    });

    const enteredPin=

        document.getElementById(
            `pin-${id}`
        ).value;

    if(

        enteredPin!=orderData.orderCode

    ){

        alert("Incorrect PIN!");

        return;

    }

    await updateDoc(

        doc(db,"orders",id),

        {

            status:"Delivered"

        }

    );

    alert("Delivery Completed!");

    loadOrderSummary();

}



//=========================
// GLOBAL FUNCTIONS
//=========================

window.loadOrders=loadOrders;

window.acceptOrder=acceptOrder;

window.loadOrderSummary=loadOrderSummary;

window.startDelivery=startDelivery;

window.completeDelivery=completeDelivery;

</script>

</body>

</html>
